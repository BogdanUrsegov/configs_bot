version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./bot:/app/bot
      - sqlite_data:/data
    depends_on:
      - cache  # Зависим только от Redis (если он нужен для FSM/кэша)
    restart: unless-stopped
    command: python -m bot.main
    user: "root"

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
      
volumes:
  redis_data:
  sqlite_data: